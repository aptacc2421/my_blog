<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tech · 技术</title>
  <link rel="stylesheet" href="assets/fonts.css" media="print" onload="this.media='all'">
  <style>
    /* 技术侧：暗色模式 — 整页一道纵向渐变，随内容高度延展 */
    html {
      min-height: 100vh;
      min-height: 100dvh;
      /* 渐变末端色，供不足一屏时与下方衔接 */
      background-color: #161412;
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flow-root;
      color: #ddd8d0;
      font-family: ui-monospace, "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
      font-size: 15px;
      line-height: 1.55;
      background: transparent;
      --tech-serif-zh: "LXGW WenKai Screen", "LXGW WenKai", "PingFang SC", serif;
      --tech-serif-en: "EB Garamond", Georgia, serif;
      --tech-mono: ui-monospace, "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
    }
    body.tech-read #list {
      display: none;
    }
    body.tech-read #article {
      max-width: 42rem;
      padding-top: 0.5rem;
    }
    .nav-back-list {
      display: none;
      margin: 1rem 0 0 1.25rem;
      font-size: 0.82rem;
      color: #9a9590;
    }
    body.tech-read .nav-back-list {
      display: inline-block;
    }
    body::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      min-height: 100%;
      height: max(100%, 100vh);
      height: max(100%, 100dvh);
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 235, 210, 0.05) 0%, transparent 20%),
        linear-gradient(180deg, #2c2826 0%, #201e1c 48%, #161412 100%);
    }
    body::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      min-height: 100%;
      height: max(100%, 100vh);
      height: max(100%, 100dvh);
      z-index: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0 1px,
        rgba(255, 255, 255, 0.03) 1px 2px
      );
    }
    .tech-nav-row,
    #list,
    #article {
      position: relative;
      z-index: 1;
    }
    a {
      color: #7ec8c4;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: #a8ebe6;
    }
    .nav-back {
      display: inline-block;
      margin: 1rem 0 0 1.25rem;
      font-size: 0.82rem;
      color: #9a9590;
    }
    #list {
      max-width: 40rem;
      margin: 1.25rem auto 2rem;
      padding: 0 1.25rem;
    }
    #list h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      font-family: inherit;
      letter-spacing: 0.06em;
      color: #b4c8cc;
      text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.45);
    }
    #list h1.tech-h1 {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      line-height: 1.2;
    }
    #list h1.tech-h1 .tech-h1-zh {
      letter-spacing: 0.06em;
    }
    #list h1.tech-h1 .tech-h1-en {
      font-family: "EB Garamond", "LXGW WenKai", Georgia, serif;
      font-size: 0.78rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.04em;
      color: #9a9187;
      text-shadow: none;
    }
    #list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #list li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin: 0.4rem 0;
    }
    #list .tech-list-title {
      flex: 1 1 auto;
      min-width: 0;
    }
    #list .tech-list-date {
      flex: 0 0 auto;
      font-family: "EB Garamond", "LXGW WenKai", Georgia, serif;
      font-size: 0.78rem;
      font-weight: 400;
      font-style: italic;
      color: #9a9187;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    #article {
      max-width: 46rem;
      margin: 0 auto 3rem;
      padding: 0 1.25rem 3rem;
      font-family: var(--tech-serif-zh), var(--tech-serif-en);
      font-size: clamp(0.92rem, 1.05vw, 1rem);
      line-height: 1.78;
      letter-spacing: 0.02em;
    }
    #article:empty {
      display: none;
    }
    #article a[id] + h1,
    #article a[id] + h2 {
      scroll-margin-top: 1.25rem;
    }
    #article h2:has(+ ul.tech-toc) {
      font-size: 0.88rem;
      font-weight: 500;
      color: #9a9187;
      letter-spacing: 0.1em;
      margin: 0.25em 0 0.4em;
    }
    #article ul.tech-toc {
      margin: 0 0 1.75em;
      padding: 0.85em 1em 0.65em;
      border: 1px solid rgba(255, 240, 230, 0.1);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.12);
      list-style: none;
      font-family: var(--tech-mono);
      font-size: 0.88em;
      line-height: 1.55;
    }
    #article ul.tech-toc ul {
      margin: 0.25em 0 0.15em;
      padding-left: 1.15em;
      list-style: none;
      border: none;
      background: transparent;
      padding-top: 0;
      padding-bottom: 0;
    }
    #article ul.tech-toc li {
      margin: 0.28em 0;
    }
    #article ul.tech-toc a {
      text-decoration: none;
      border-bottom: 1px solid rgba(126, 200, 196, 0.25);
    }
    #article ul.tech-toc a:hover {
      border-bottom-color: #a8ebe6;
    }
    #article h1,
    #article h2,
    #article h3,
    #article h4,
    #article h5,
    #article h6 {
      font-family: var(--tech-serif-zh), var(--tech-serif-en);
      font-weight: 600;
      color: #ddd8d0;
      margin: 1.85em 0 0.55em;
      line-height: 1.4;
    }
    #article h1:first-child,
    #article h2:first-child,
    #article h3:first-child {
      margin-top: 0;
    }
    #article h1 { font-size: 1.55rem; color: #e8e2da; }
    #article h2 { font-size: 1.2rem; color: #ddd8d0; }
    #article h3 { font-size: 1.05rem; color: #d0cbc4; }
    #article h4 { font-size: 1rem; color: #b8ccd0; }
    #article h5 { font-size: 0.95rem; color: #a8bcc0; }
    #article h6 { font-size: 0.9rem; color: #98acb0; }
    #article p {
      margin: 0 0 0.85em;
    }
    #article p:last-child {
      margin-bottom: 0;
    }
    #article a {
      color: #7ec8c4;
    }
    #article a:hover {
      color: #a8ebe6;
    }
    #article ul,
    #article ol {
      margin: 0.5em 0 0.85em;
      padding-left: 1.5em;
    }
    #article li {
      margin: 0.25em 0;
    }
    #article li > ul,
    #article li > ol {
      margin-top: 0.25em;
      margin-bottom: 0.25em;
    }
    #article blockquote {
      margin: 0.75em 0;
      padding: 0.35em 0 0.35em 1em;
      border-left: 3px solid #5a9aa0;
      color: #b8b2aa;
      background: rgba(0, 0, 0, 0.15);
    }
    #article blockquote > :first-child {
      margin-top: 0;
    }
    #article blockquote > :last-child {
      margin-bottom: 0;
    }
    #article hr {
      margin: 2.25em auto;
      max-width: 5rem;
      border: none;
      border-top: 1px solid rgba(255, 240, 230, 0.1);
    }
    #article .tech-table-wrap {
      margin: 0.75em 0 1em;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    #article table {
      width: 100%;
      min-width: 28rem;
      margin: 0;
      border-collapse: collapse;
      font-family: var(--tech-mono);
      font-size: 0.84em;
      line-height: 1.45;
    }
    #article th,
    #article td {
      padding: 0.45em 0.65em;
      border: 1px solid rgba(255, 240, 230, 0.14);
      text-align: left;
    }
    #article th {
      background: rgba(90, 154, 160, 0.15);
      color: #c8dce0;
      font-weight: 600;
    }
    #article tr:nth-child(even) td {
      background: rgba(0, 0, 0, 0.12);
    }
    #article img {
      max-width: 100%;
      height: auto;
      margin: 0.5em 0;
      border-radius: 2px;
      border: 1px solid rgba(255, 240, 230, 0.1);
    }
    #article del {
      color: #8f8983;
      text-decoration: line-through;
    }
    #article input[type="checkbox"] {
      margin-right: 0.35em;
      accent-color: #5a9aa0;
      vertical-align: middle;
    }
    #article code {
      font-family: var(--tech-mono);
      font-size: 0.92em;
      background: rgba(34, 32, 30, 0.85);
      color: #c5e8e4;
      padding: 0.12em 0.35em;
      border-radius: 3px;
      border: 1px solid rgba(255, 245, 235, 0.08);
    }
    #article pre {
      font-family: var(--tech-mono);
      background: #1e1c1a;
      color: #ddd8d0;
      border: 1px solid rgba(255, 245, 235, 0.08);
      border-left: 3px solid #5a9aa0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      padding: 0.85rem 1rem;
      overflow-x: hidden;
      overflow-y: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 4px;
      margin: 0.85em 0 1em;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 240, 230, 0.2) transparent;
    }
    #article pre:has(code.hljs) {
      white-space: pre;
      word-break: normal;
      overflow-x: auto;
    }
    #article pre::-webkit-scrollbar,
    #article .tech-table-wrap::-webkit-scrollbar {
      height: 5px;
      width: 5px;
    }
    #article pre::-webkit-scrollbar-track,
    #article .tech-table-wrap::-webkit-scrollbar-track {
      background: transparent;
    }
    #article pre::-webkit-scrollbar-thumb,
    #article .tech-table-wrap::-webkit-scrollbar-thumb {
      background: rgba(255, 240, 230, 0.18);
      border-radius: 999px;
    }
    #article pre::-webkit-scrollbar-thumb:hover,
    #article .tech-table-wrap::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 240, 230, 0.28);
    }
    #article .tech-table-wrap {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 240, 230, 0.2) transparent;
    }
    #article pre code {
      padding: 0;
      border: none;
      background: transparent;
      color: inherit;
      font-size: 0.94em;
      line-height: 1.5;
      white-space: inherit;
      word-break: inherit;
    }
    /* highlight.js — 暖暗色 token，与页面灰青/暖金一致 */
    #article pre code.hljs {
      display: block;
      white-space: pre;
    }
    #article .hljs-comment,
    #article .hljs-quote {
      color: #7a7570;
      font-style: italic;
    }
    #article .hljs-keyword,
    #article .hljs-selector-tag,
    #article .hljs-built_in {
      color: #7ec8c4;
    }
    #article .hljs-string,
    #article .hljs-regexp,
    #article .hljs-template-variable {
      color: #c9b06a;
    }
    #article .hljs-number,
    #article .hljs-literal {
      color: #dcc47a;
    }
    #article .hljs-title,
    #article .hljs-title.function_,
    #article .hljs-function .hljs-title {
      color: #a8ebe6;
    }
    #article .hljs-variable,
    #article .hljs-params,
    #article .hljs-attr {
      color: #ddd8d0;
    }
    #article .hljs-type,
    #article .hljs-class .hljs-title {
      color: #8ab8bc;
    }
    #article .hljs-meta,
    #article .hljs-subst {
      color: #b8b2aa;
    }
    #article kbd {
      display: inline-block;
      padding: 0.1em 0.4em;
      font-size: 0.88em;
      background: #2a2826;
      border: 1px solid rgba(255, 240, 230, 0.2);
      border-radius: 3px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.3);
    }
    #article mark {
      background: rgba(90, 154, 160, 0.35);
      color: inherit;
      padding: 0 0.15em;
    }
    #article .tech-written-at {
      margin: 2.25em 0 0;
      padding-top: 0.85em;
      border-top: 1px solid rgba(255, 240, 230, 0.08);
      font-family: "EB Garamond", "LXGW WenKai", Georgia, serif;
      font-size: 0.78rem;
      font-weight: 400;
      font-style: italic;
      color: #9a9187;
      text-align: right;
      letter-spacing: 0.04em;
    }
    .muted {
      color: #8f8983;
      font-size: 0.9rem;
    }
    .muted-en {
      display: block;
      margin-top: 0.45rem;
      font-size: 0.82rem;
      color: #7a7570;
    }
    .nav-back-en {
      font-family: "EB Garamond", "LXGW WenKai", Georgia, serif;
      font-size: 0.72rem;
      font-weight: 400;
      font-style: italic;
      color: #9a9187;
      margin-left: 0.35em;
      letter-spacing: 0.04em;
    }
    .tech-nav-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem 1.25rem;
      padding: 1rem 1.25rem 0;
    }
    .tech-nav-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
    }
    .tech-nav-row .nav-back,
    .tech-nav-row .nav-back-list {
      margin: 0;
    }
    .tech-lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      flex-shrink: 0;
      font-family: "EB Garamond", "LXGW WenKai", Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      letter-spacing: 0.04em;
    }
    .tech-lang-sep {
      color: #6a6560;
      user-select: none;
    }
    .tech-lang-btn {
      font: inherit;
      font-style: italic;
      color: #c5bfb5;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      letter-spacing: 0.04em;
      border-bottom: 1px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .tech-lang-btn:hover {
      color: #f0ebe4;
    }
    .tech-lang-btn.is-active {
      color: #9ee8e4;
      border-bottom-color: rgba(158, 232, 228, 0.5);
    }
  </style>
  <script src="assets/md-unfussy.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div class="tech-nav-row">
    <div class="tech-nav-links">
      <a class="nav-back" href="index.html">回门厅<span class="nav-back-en" lang="en"> · Back</span></a>
      <a class="nav-back-list" href="tech.html">回列表<span class="nav-back-en" lang="en"> · List</span></a>
    </div>
    <div id="lang-switch" class="tech-lang-switch" aria-label="Language">
      <button type="button" class="tech-lang-btn is-active" data-lang="zh" aria-pressed="true">中文</button>
      <span class="tech-lang-sep" aria-hidden="true">/</span>
      <button type="button" class="tech-lang-btn" data-lang="en" aria-pressed="false">EN</button>
    </div>
  </div>
  <div id="list"></div>
  <article id="article"></article>
  <script src="assets/tech.js?v=20260630c"></script>
</body>
</html>
