<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>技术</title>
  <style>
    html {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100%;
      position: relative;
      color: #faf4ed;
      font-family: ui-monospace, "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
      font-size: 15px;
      line-height: 1.55;
      background-color: #5c2228;
      background-image:
        linear-gradient(180deg, rgba(255, 238, 220, 0.11) 0%, transparent 24%),
        linear-gradient(205deg, rgba(255, 140, 100, 0.1) 0%, transparent 42%),
        radial-gradient(ellipse 95% 65% at 50% -12%, #c84850 0%, transparent 46%),
        radial-gradient(ellipse 50% 45% at 105% 92%, rgba(72, 14, 22, 0.65) 0%, transparent 55%),
        radial-gradient(ellipse 42% 50% at -8% 45%, rgba(140, 42, 52, 0.4) 0%, transparent 48%),
        linear-gradient(168deg, #a03842 0%, #722a32 28%, #4e1e24 58%, #38141a 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.055;
      background-image: repeating-linear-gradient(
        -11deg,
        transparent 0 4px,
        rgba(255, 255, 255, 0.045) 4px 5px
      );
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 230, 210, 0.14),
        inset 0 0 0 1px rgba(255, 200, 180, 0.04),
        inset 0 -100px 120px -50px rgba(0, 0, 0, 0.22),
        inset 0 0 140px rgba(12, 4, 6, 0.28);
    }
    .nav-back,
    #list,
    #article {
      position: relative;
      z-index: 1;
    }
    a {
      color: #e8b86a;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: #ffecc4;
    }
    .nav-back {
      display: inline-block;
      margin: 1rem 0 0 1.25rem;
      font-size: 0.82rem;
      color: #d4b8ae;
    }
    #list {
      max-width: 40rem;
      margin: 1.25rem auto 2rem;
      padding: 0 1.25rem;
    }
    #list h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      font-family: inherit;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }
    #list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #list li {
      margin: 0.4rem 0;
    }
    #article {
      max-width: 46rem;
      margin: 0 auto 3rem;
      padding: 0 1.25rem;
      border-top: 1px solid rgba(255, 200, 160, 0.28);
      padding-top: 1.5rem;
    }
    #article:empty {
      display: none;
    }
    #article h1,
    #article h2,
    #article h3 {
      font-family: inherit;
      font-weight: 600;
      color: #fff5ed;
    }
    #article a {
      color: #f0c86c;
    }
    #article a:hover {
      color: #ffe4a8;
    }
    #article pre,
    #article code {
      font-family: inherit;
      background: linear-gradient(165deg, rgba(0, 0, 0, 0.32) 0%, rgba(30, 8, 12, 0.45) 100%);
      color: #f5e6dc;
      border: 1px solid rgba(240, 190, 120, 0.15);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    #article pre {
      padding: 0.75rem 1rem;
      overflow: auto;
      border-radius: 2px;
    }
    .muted {
      color: #d0b8b0;
      font-size: 0.9rem;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <a class="nav-back" href="index.html">回门厅</a>
  <div id="list"></div>
  <article id="article"></article>
  <script src="assets/tech.js"></script>
</body>
</html>
