<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tech · 技术</title>
  <style>
    /* 技术侧：暗色模式 — 暖炭底 + 灰青字色（仍偏暖，不冷灰、不红） */
    html {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100%;
      position: relative;
      color: #ddd8d0;
      font-family: ui-monospace, "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
      font-size: 15px;
      line-height: 1.55;
      background-color: #1a1816;
      background-image:
        linear-gradient(180deg, rgba(255, 235, 210, 0.055) 0%, transparent 32%),
        linear-gradient(168deg, #2c2826 0%, #201e1c 48%, #161412 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0 1px,
        rgba(255, 255, 255, 0.03) 1px 2px
      );
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 240, 220, 0.04),
        inset 0 0 100px rgba(0, 0, 0, 0.35);
    }
    .nav-back,
    #list,
    #article {
      position: relative;
      z-index: 1;
    }
    a {
      color: #7ec8c4;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: #a8ebe6;
    }
    .nav-back {
      display: inline-block;
      margin: 1rem 0 0 1.25rem;
      font-size: 0.82rem;
      color: #9a9590;
    }
    #list {
      max-width: 40rem;
      margin: 1.25rem auto 2rem;
      padding: 0 1.25rem;
    }
    #list h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      font-family: inherit;
      letter-spacing: 0.06em;
      color: #b4c8cc;
      text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.45);
    }
    #list h1.tech-h1 {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      line-height: 1.2;
    }
    #list h1.tech-h1 .tech-h1-zh {
      letter-spacing: 0.06em;
    }
    #list h1.tech-h1 .tech-h1-en {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: #8a9398;
      text-shadow: none;
    }
    #list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #list li {
      margin: 0.4rem 0;
    }
    #article {
      max-width: 46rem;
      margin: 0 auto 3rem;
      padding: 0 1.25rem;
      border-top: 1px solid rgba(255, 240, 230, 0.12);
      padding-top: 1.5rem;
    }
    #article:empty {
      display: none;
    }
    #article h1,
    #article h2,
    #article h3 {
      font-family: inherit;
      font-weight: 600;
      color: #c8dce0;
    }
    #article a {
      color: #7ec8c4;
    }
    #article a:hover {
      color: #a8ebe6;
    }
    #article pre,
    #article code {
      font-family: inherit;
      background: #22201e;
      color: #e6e1da;
      border: 1px solid rgba(255, 245, 235, 0.1);
      border-left: 3px solid #5a9aa0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    #article pre {
      padding: 0.75rem 1rem;
      overflow: auto;
      border-radius: 3px;
    }
    .muted {
      color: #8f8983;
      font-size: 0.9rem;
    }
    .muted-en {
      display: block;
      margin-top: 0.45rem;
      font-size: 0.82rem;
      color: #7a7570;
    }
    .nav-back-en {
      font-size: 0.72rem;
      color: #7a7570;
      margin-left: 0.35em;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <a class="nav-back" href="index.html">回门厅<span class="nav-back-en" lang="en"> · Back</span></a>
  <div id="list"></div>
  <article id="article"></article>
  <script src="assets/tech.js"></script>
</body>
</html>
