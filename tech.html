<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>技术</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #fff;
      color: #111;
      font-family: ui-monospace, "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
      font-size: 15px;
      line-height: 1.55;
    }
    a {
      color: #0b57d0;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .nav-back {
      display: inline-block;
      margin: 1rem 0 0 1.25rem;
      font-size: 0.82rem;
      color: #444;
    }
    #list {
      max-width: 40rem;
      margin: 1.25rem auto 2rem;
      padding: 0 1.25rem;
    }
    #list h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      font-family: inherit;
    }
    #list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #list li {
      margin: 0.4rem 0;
    }
    #article {
      max-width: 46rem;
      margin: 0 auto 3rem;
      padding: 0 1.25rem;
      border-top: 1px solid #ddd;
      padding-top: 1.5rem;
    }
    #article:empty {
      display: none;
    }
    #article h1,
    #article h2,
    #article h3 {
      font-family: inherit;
      font-weight: 600;
    }
    #article pre,
    #article code {
      font-family: inherit;
      background: #f4f4f4;
    }
    #article pre {
      padding: 0.75rem 1rem;
      overflow: auto;
    }
    .muted {
      color: #666;
      font-size: 0.9rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <a class="nav-back" href="index.html">回门厅</a>
  <div id="list"></div>
  <article id="article"></article>
  <script src="assets/tech.js"></script>
</body>
</html>
