<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>技术</title>
  <style>
    /* 技术侧：暖灰工程纸 + 墨青（与生活的暗金暖底同系，不要纯白、不要红） */
    html {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100%;
      position: relative;
      color: #262422;
      font-family: ui-monospace, "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
      font-size: 15px;
      line-height: 1.55;
      background-color: #dad6cf;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, transparent 38%),
        linear-gradient(168deg, #ebe8e2 0%, #ddd9d2 45%, #d3cfc7 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0 1px,
        rgba(0, 0, 0, 0.018) 1px 2px
      );
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      box-shadow: inset 0 0 120px rgba(55, 48, 40, 0.07);
    }
    .nav-back,
    #list,
    #article {
      position: relative;
      z-index: 1;
    }
    a {
      color: #1a5c6a;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: #0f4a58;
    }
    .nav-back {
      display: inline-block;
      margin: 1rem 0 0 1.25rem;
      font-size: 0.82rem;
      color: #5a5652;
    }
    #list {
      max-width: 40rem;
      margin: 1.25rem auto 2rem;
      padding: 0 1.25rem;
    }
    #list h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      font-family: inherit;
      letter-spacing: 0.06em;
      color: #142c34;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
    }
    #list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #list li {
      margin: 0.4rem 0;
    }
    #article {
      max-width: 46rem;
      margin: 0 auto 3rem;
      padding: 0 1.25rem;
      border-top: 1px solid #b8b2a8;
      padding-top: 1.5rem;
    }
    #article:empty {
      display: none;
    }
    #article h1,
    #article h2,
    #article h3 {
      font-family: inherit;
      font-weight: 600;
      color: #122830;
    }
    #article a {
      color: #1a5c6a;
    }
    #article a:hover {
      color: #0f4a58;
    }
    #article pre,
    #article code {
      font-family: inherit;
      background: #f2f0eb;
      color: #1c2226;
      border: 1px solid #c4beb4;
      border-left: 3px solid #4a6d78;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    #article pre {
      padding: 0.75rem 1rem;
      overflow: auto;
      border-radius: 3px;
    }
    .muted {
      color: #5e5954;
      font-size: 0.9rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <a class="nav-back" href="index.html">回门厅</a>
  <div id="list"></div>
  <article id="article"></article>
  <script src="assets/tech.js"></script>
</body>
</html>
